<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>usher — front desk</title>
<style>
  :root {
    --bg: #0f1117; --panel: #171a21; --border: #262b36; --text: #e6e9ef;
    --muted: #8b93a1; --accent: #6ea8fe;
    --stopped: #6b7280; --starting: #d9a441; --live: #3fb950; --failed: #f85149; --stopping: #d9a441;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 16px; margin: 0; letter-spacing: 0.3px; }
  header .sub { color: var(--muted); font-size: 12px; }
  header #conn { margin-left: auto; font-size: 12px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .dot.up { background: var(--live); }
  .dot.down { background: var(--failed); }
  main { padding: 20px; display: grid; gap: 20px; max-width: 1100px; }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  section > h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin: 0; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 16px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #0b0d12; }
  .pill.stopped { background: var(--stopped); color: #fff; }
  .pill.starting, .pill.stopping { background: var(--starting); }
  .pill.live { background: var(--live); }
  .pill.failed { background: var(--failed); color: #fff; }
  button {
    background: #222733; color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 11px; font-size: 12px; cursor: pointer; margin-right: 5px;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.45; cursor: default; }
  .err { color: var(--failed); font-size: 12px; }
  .muted { color: var(--muted); }
  code { background: #0b0d12; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  #feed { max-height: 320px; overflow-y: auto; }
  #feed td { font-size: 12.5px; }
  .empty { padding: 16px; color: var(--muted); font-size: 13px; }
  .tool { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>usher</h1>
  <span class="sub">front desk — MCP broker</span>
  <span id="conn"><span class="dot down"></span><span id="connText">connecting…</span></span>
</header>
<main>
  <section>
    <h2>Backends</h2>
    <table>
      <thead><tr><th>Name</th><th>State</th><th>Tools</th><th>Refs</th><th>Uptime</th><th>Manage</th></tr></thead>
      <tbody id="backends"><tr><td colspan="6" class="empty">loading…</td></tr></tbody>
    </table>
  </section>

  <section>
    <h2>Connections — who is calling what</h2>
    <table>
      <thead><tr><th>Conn</th><th>Agent PID</th><th>Backend</th><th>Opened</th></tr></thead>
      <tbody id="connections"><tr><td colspan="4" class="empty">no connections</td></tr></tbody>
    </table>
  </section>

  <section>
    <h2>Live activity</h2>
    <table>
      <thead><tr><th>Time</th><th>Event</th><th>Conn</th><th>Backend</th><th>Tool / detail</th></tr></thead>
      <tbody id="feed"><tr><td colspan="5" class="empty">waiting for events…</td></tr></tbody>
    </table>
  </section>
</main>

<script>
"use strict";

const $ = (id) => document.getElementById(id);
const backends = new Map();      // name -> status object
const connections = new Map();   // connID -> conn object
let feed = [];                   // recent activity rows (newest first)
const FEED_MAX = 60;

function fmtUptime(startedAt) {
  if (!startedAt || startedAt.startsWith("0001")) return "—";
  const ms = Date.now() - new Date(startedAt).getTime();
  if (ms < 0 || !isFinite(ms)) return "—";
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + "s";
  const m = Math.floor(s / 60);
  if (m < 60) return m + "m " + (s % 60) + "s";
  const h = Math.floor(m / 60);
  return h + "h " + (m % 60) + "m";
}

function fmtTime(ts) {
  const d = ts ? new Date(ts) : new Date();
  return d.toLocaleTimeString();
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function renderBackends() {
  const tb = $("backends");
  if (backends.size === 0) {
    tb.innerHTML = '<tr><td colspan="6" class="empty">no backends configured</td></tr>';
    return;
  }
  const names = [...backends.keys()].sort();
  tb.innerHTML = names.map((name) => {
    const b = backends.get(name);
    const st = b.state || "stopped";
    const busy = st === "starting" || st === "stopping";
    const errLine = b.err ? '<div class="err">' + esc(b.err) + "</div>" : "";
    return "<tr>" +
      "<td><code>" + esc(name) + "</code>" + errLine + "</td>" +
      '<td><span class="pill ' + esc(st) + '">' + esc(st) + "</span></td>" +
      "<td>" + (b.toolCount != null ? b.toolCount : "—") + "</td>" +
      "<td>" + (b.refs != null ? b.refs : 0) + "</td>" +
      "<td>" + esc(fmtUptime(b.startedAt)) + "</td>" +
      "<td>" +
        '<button onclick="manage(\'' + esc(name) + "','start')\"" + (st === "live" || busy ? " disabled" : "") + ">Start</button>" +
        '<button onclick="manage(\'' + esc(name) + "','stop')\"" + (st === "live" || st === "failed" ? "" : " disabled") + ">Stop</button>" +
        '<button onclick="manage(\'' + esc(name) + "','restart')\"" + (busy ? " disabled" : "") + ">Restart</button>" +
      "</td></tr>";
  }).join("");
}

function renderConnections() {
  const tb = $("connections");
  if (connections.size === 0) {
    tb.innerHTML = '<tr><td colspan="4" class="empty">no connections</td></tr>';
    return;
  }
  const rows = [...connections.values()].sort((a, b) =>
    (a.openedAt || "").localeCompare(b.openedAt || ""));
  tb.innerHTML = rows.map((c) =>
    "<tr><td><code>" + esc(c.connID) + "</code></td><td>" + esc(c.agentPID) +
    "</td><td>" + esc(c.backend) + "</td><td>" + esc(fmtTime(c.openedAt)) + "</td></tr>"
  ).join("");
}

function pushFeed(row) {
  feed.unshift(row);
  if (feed.length > FEED_MAX) feed.length = FEED_MAX;
  const tb = $("feed");
  tb.innerHTML = feed.map((r) =>
    "<tr><td>" + esc(r.time) + "</td><td>" + esc(r.kind) + "</td><td><code>" +
    esc(r.conn) + "</code></td><td>" + esc(r.backend) + "</td><td>" + r.detail + "</td></tr>"
  ).join("");
}

async function manage(name, action) {
  try {
    const res = await fetch("/api/backends/" + encodeURIComponent(name) + "/" + action, { method: "POST" });
    const body = await res.json().catch(() => ({}));
    if (body && body.name) {
      backends.set(body.name, body);
      renderBackends();
    }
    if (!res.ok && body && body.error) {
      pushFeed({ time: fmtTime(), kind: "action-error", conn: "—", backend: name, detail: '<span class="err">' + esc(body.error) + "</span>" });
    }
  } catch (e) {
    pushFeed({ time: fmtTime(), kind: "action-error", conn: "—", backend: name, detail: '<span class="err">' + esc(e.message) + "</span>" });
  }
}
window.manage = manage;

async function seed() {
  try {
    const res = await fetch("/api/backends");
    const list = await res.json();
    backends.clear();
    for (const b of list) backends.set(b.name, b);
    renderBackends();
  } catch (e) { /* SSE snapshot will fill in */ }
  try {
    const res = await fetch("/api/connections");
    const list = await res.json();
    connections.clear();
    for (const c of list) connections.set(c.connID, c);
    renderConnections();
  } catch (e) { /* ignore */ }
}

function applySnapshot(data) {
  if (Array.isArray(data.backends)) {
    backends.clear();
    for (const b of data.backends) backends.set(b.name, b);
    renderBackends();
  }
  if (Array.isArray(data.connections)) {
    connections.clear();
    for (const c of data.connections) connections.set(c.connID, c);
    renderConnections();
  }
}

function setConn(up) {
  const dot = document.querySelector("#conn .dot");
  dot.className = "dot " + (up ? "up" : "down");
  $("connText").textContent = up ? "live" : "reconnecting…";
}

function connect() {
  const es = new EventSource("/api/events");

  es.addEventListener("open", () => setConn(true));
  es.addEventListener("error", () => setConn(false));

  es.addEventListener("snapshot", (e) => applySnapshot(JSON.parse(e.data)));

  es.addEventListener("backend.state", (e) => {
    const d = JSON.parse(e.data);
    const b = backends.get(d.backend) || { name: d.backend };
    b.state = d.to;
    if (d.to !== "live") { b.startedAt = null; }
    backends.set(d.backend, b);
    renderBackends();
    // A real transition refreshes counts/uptime from the authoritative list.
    fetch("/api/backends").then((r) => r.json()).then((list) => {
      for (const x of list) backends.set(x.name, x);
      renderBackends();
    }).catch(() => {});
    pushFeed({ time: fmtTime(d.ts), kind: "state", conn: "—", backend: d.backend,
      detail: esc(d.from) + " → " + '<span class="pill ' + esc(d.to) + '">' + esc(d.to) + "</span>" });
  });

  es.addEventListener("conn.open", (e) => {
    const d = JSON.parse(e.data);
    connections.set(d.connID, { connID: d.connID, agentPID: d.pid, backend: d.backend, openedAt: d.ts });
    renderConnections();
    pushFeed({ time: fmtTime(d.ts), kind: "conn.open", conn: d.connID, backend: d.backend, detail: "pid " + esc(d.pid) });
  });

  es.addEventListener("conn.close", (e) => {
    const d = JSON.parse(e.data);
    connections.delete(d.connID);
    renderConnections();
    pushFeed({ time: fmtTime(d.ts), kind: "conn.close", conn: d.connID, backend: "—", detail: esc(d.reason) });
  });

  es.addEventListener("request", (e) => {
    const d = JSON.parse(e.data);
    pushFeed({ time: fmtTime(d.ts), kind: "request", conn: d.connID, backend: d.backend,
      detail: d.tool ? '<span class="tool">' + esc(d.tool) + "</span>" : "<span class='muted'>rpc " + esc(d.rpcID) + "</span>" });
  });

  es.addEventListener("response", (e) => {
    const d = JSON.parse(e.data);
    let detail = esc(d.bytes) + " B";
    if (d.trimmedFromBytes && d.trimmedFromBytes > d.bytes) {
      detail += ' <span class="muted">(trimmed from ' + esc(d.trimmedFromBytes) + ")</span>";
    }
    pushFeed({ time: fmtTime(d.ts), kind: "response", conn: d.connID, backend: d.backend, detail });
  });

  es.addEventListener("gate.block", (e) => {
    const d = JSON.parse(e.data);
    pushFeed({ time: fmtTime(d.ts), kind: "gate.block", conn: d.connID, backend: "—",
      detail: '<span class="err">blocked ' + esc(d.tool) + "</span>" });
  });

  es.addEventListener("lock", (e) => {
    const d = JSON.parse(e.data);
    pushFeed({ time: fmtTime(d.ts), kind: "lock", conn: d.connID, backend: "—",
      detail: (d.acquired ? "acquired " : "released ") + "<code>" + esc(d.key) + "</code>" });
  });
}

// Periodically refresh uptime cells in place.
setInterval(() => { if (backends.size) renderBackends(); }, 5000);

seed();
connect();
</script>
</body>
</html>
